<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keerz Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #3a8dde, #6dd5fa);
    color: white;
    text-align: center;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 30px;
    letter-spacing: 2px;
}

/* CARD */
.container {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 220px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 150px;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* SCRIPT BOX */
.script-box {
    margin-top: 40px;
    display: none;
}

textarea {
    width: 80%;
    height: 120px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 14px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}
</style>

</head>

<body>

<h1>🎮 TIPSY HUB - CATCH AND TAME</h1>

<div class="container">
    <div class="card" onclick="showScript()">
        <img src="catchandtame.png">
        <h3>Catch and Tame</h3>
    </div>
</div>

<div class="script-box" id="scriptBox">
    <h2>Your Script</h2>
    <textarea id="scriptText" readonly></textarea><br>
    <button onclick="copyScript()">Copy Script</button>
</div>

<script>
const script = "loadstring(game:HttpGet("https://raw.githubusercontent.com/oxbahsw/keerzhub/refs/heads/main/loader.lua"))()";

function showScript() {
    document.getElementById("scriptBox").style.display = "block";
    document.getElementById("scriptText").value = script;
}

function copyScript() {
    const text = document.getElementById("scriptText");
    text.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
